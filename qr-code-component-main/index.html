<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Outfit" />
    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      .box {
        
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        margin-top: 40px;
        width: 350px;
        padding: 24px;
        border-radius: 25px;
        box-shadow: 0px 0px 14px 2px rgba(0, 0, 0, 0.17);
        background-color: rgb(255, 255, 255);
        
      }

      @media screen and (max-width: 800px) {
        .box {
          width: 250px;
          
        }
      }

      
      .contain-image {
        width: 100%;
        border-radius: 15px;
      }
      .alg-midle {
        display: flex;
        justify-content: center;
        margin-bottom: 40px;
      }

      body {
        background-color: rgb(213, 225, 239);
        font-family: "Outfit", sans-serif;
        text-align: center;
        
      }
      .container {
        
        display: flex;
        justify-content: center;
        align-items: center;
        text-justify: inter-word;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="alg-midle">
          <img src="images/image-qr-code.png" alt="" class="contain-image" />
        </div>

        <div style="font-weight: 700; font-size: 22px; padding: 24px">
          Improve your front-end skills by building projects
        </div>
        <div style="font-weight: 400; font-size: 15px; padding: 0px 24px 24px 24px;">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </div>
      </div>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
